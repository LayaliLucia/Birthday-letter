<!DOCTYPE html>
<html lang="en">
 <head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles.css" />
    <title>Birthday Letter</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link 
     href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" 
     rel="stylesheet"
    />
  </head>
  <body>

    <button id="music-toggle" type="button">🔈 Music</button>
    <audio id="bg-music" loop preload="auto">
      <source src="cute-lofi.mp3" type="audio/mpeg" />
    </audio>

  <!--Envelope Screen -->
  <div id="envelope-container">
   <img src="envelopeee.jpg" alt="Envelope" id="envelope" />
   <p>♡ Letter for You ♡</p>
  </div>


  <!-- Letter Screen -->
  <div id="letter-container">
   <div class="letter-window">

    <!-- <h1 id="letter-title">🎉 Happy Birthday! 🎉</h1> -->

    <!-- <p class="subtitle">
        Click the gift below to unwrap your surprise!
    </p> -->

    <div class="buttons" id="letter-buttons">
        <img src="gift.png" class="btn gift-btn" alt="Open Gift">
    </div>

    <p id="final-text" class="final-text" style="display:none;"></p>

    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
